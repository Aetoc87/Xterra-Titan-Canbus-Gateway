[platformio]
default_envs = gateway

[common]
platform = teensy
board = teensy41
framework = arduino
lib_deps = tonton81/FlexCAN_T4

[env:gateway]
extends = common
src_dir = firmware/gateway

[env:sniffer_freetext]
extends = common
src_dir = firmware/sniffer_freetext

[env:tach_target_test]
extends = common
src_dir = firmware/tach_target_test

[env:tcm_spoof_test]
extends = common
src_dir = firmware/tcm_spoof_test
